<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>نظام الإدارة المؤسسية الآمن — Secure Institutional Management System</title>
<style>
  :root{
    --bg:#0a1019; --bg2:#0d1524; --surface:#111c30; --surface2:#16233b;
    --surface3:#1b2c49; --border:#243450; --border2:#2e4b6e;
    --border-soft:#21314c;
    --text:#e7edf7; --muted:#8ea0bf; --muted2:#647794;
    --gold:#cda434; --gold-soft:#3a3116; --cyan:#46b4dd; --cyan-soft:#13354a;
    --green:#34c98a; --red:#e35b5b; --orange:#e09236;
    --ts:#e35b5b; --secret:#e09236; --restricted:#cda434; --public:#46b4dd;
    --r:14px; --r-sm:9px;
    --shadow:0 18px 50px -18px rgba(0,0,0,.7);
    --shadow-soft:0 8px 24px -12px rgba(0,0,0,.6);
    --font:"Segoe UI","Tahoma",system-ui,-apple-system,"Helvetica Neue",sans-serif;
    --mono:"SF Mono","Consolas","Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  /* atmosphere */
  .atmos{position:fixed;inset:0;z-index:0;pointer-events:none}
  .atmos::before{content:"";position:absolute;inset:0;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(70,180,221,.10), transparent 60%),
      radial-gradient(700px 600px at 0% 110%, rgba(205,164,52,.07), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));}
  .atmos::after{content:"";position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:46px 46px;}
  #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}

  /* classification banner */
  .classbar{height:22px;display:flex;align-items:center;justify-content:center;
    font-size:11px;letter-spacing:.18em;font-weight:700;color:#1a0f0f;
    background:repeating-linear-gradient(45deg,var(--ts),var(--ts) 14px,#c44 14px,#c44 28px);
    text-transform:uppercase}

  /* ---------- LOGIN ---------- */
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:440px;background:linear-gradient(180deg,var(--surface),var(--bg2));
    border:1px solid var(--border);border-radius:var(--r);padding:40px 36px;box-shadow:var(--shadow);
    animation:rise .6s cubic-bezier(.2,.8,.2,1) both}
  .crest{width:74px;height:74px;margin:0 auto 18px;display:block;filter:drop-shadow(0 6px 14px rgba(205,164,52,.25))}
  .login-card h1{font-size:20px;margin:0 0 4px;text-align:center;font-weight:700;letter-spacing:.01em}
  .login-card .sub{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:26px;letter-spacing:.04em}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 0;letter-spacing:.03em}
  .field{margin-bottom:16px}
  select,input{width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);
    border-radius:var(--r-sm);padding:11px 13px;font-family:var(--font);font-size:14px;outline:none;transition:.18s}
  select:focus,input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-soft)}
  .btn{width:100%;border:0;border-radius:var(--r-sm);padding:12px;font-weight:700;font-size:14px;cursor:pointer;
    font-family:var(--font);transition:.18s;letter-spacing:.02em}
  .btn-primary{background:linear-gradient(180deg,var(--gold),#a9851f);color:#1a1505}
  .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .login-foot{margin-top:18px;text-align:center;font-size:11px;color:var(--muted2);line-height:1.7}
  .demo-pill{display:inline-block;background:var(--cyan-soft);color:var(--cyan);border:1px solid #1f4f68;
    border-radius:20px;padding:3px 11px;font-size:10.5px;letter-spacing:.05em;margin-top:8px}

  /* ---------- SHELL ---------- */
  .topbar{height:58px;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(13,21,36,.85);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;white-space:nowrap}
  .brand svg{width:30px;height:30px}
  .topbar .spacer{flex:1}
  .clock{font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:.04em}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);
    border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--cyan)}
  .chip.role{background:var(--gold-soft);border-color:#5a4d1d;color:var(--gold)}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#2b6f8c);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#04212e}
  .icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;
    border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .icon-btn:hover{color:var(--text);border-color:var(--cyan)}

  .body{flex:1;display:flex;min-height:0}
  .sidebar{width:236px;background:rgba(17,28,48,.6);border-inline-start:1px solid var(--border);
    padding:16px 12px;flex-shrink:0;overflow-y:auto}
  .nav-group{font-size:10.5px;letter-spacing:.14em;color:var(--muted2);text-transform:uppercase;margin:14px 10px 8px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);
    cursor:pointer;font-size:13.5px;margin-bottom:3px;transition:.15s;font-weight:500}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:linear-gradient(90deg,var(--cyan-soft),transparent);color:var(--text);
    box-shadow:inset 2px 0 0 var(--cyan)}
  html[dir=rtl] .nav-item.active{box-shadow:inset -2px 0 0 var(--cyan)}
  .nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.9}
  .nav-item .lock{margin-inline-start:auto;font-size:11px;opacity:.6}

  .main{flex:1;overflow-y:auto;padding:26px 30px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
  .page-head h2{margin:0;font-size:22px;font-weight:700;letter-spacing:.01em}
  .page-head .desc{color:var(--muted);font-size:13px;margin-top:4px}

  /* cards / grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px}
  .card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);
    border-radius:var(--r);padding:18px;box-shadow:var(--shadow-soft);animation:rise .5s both}
  .kpi .k-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .kpi .k-label{color:var(--muted);font-size:12.5px}
  .kpi .k-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    background:var(--cyan-soft);color:var(--cyan)}
  .kpi .k-val{font-size:30px;font-weight:700;font-family:var(--mono);letter-spacing:-.02em}
  .kpi .k-delta{font-size:11.5px;margin-top:6px}
  .up{color:var(--green)} .down{color:var(--red)}

  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
  .grid2b{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:1050px){.grid2,.grid2b{grid-template-columns:1fr}}
  .card h3{margin:0 0 4px;font-size:14.5px;font-weight:700}
  .card .csub{color:var(--muted);font-size:12px;margin-bottom:16px}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:start;color:var(--muted2);font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    padding:9px 10px;border-bottom:1px solid var(--border)}
  td{padding:11px 10px;border-bottom:1px solid var(--border-soft);color:var(--text)}
  tr:last-child td{border-bottom:0}
  tbody tr{transition:.12s} tbody tr:hover{background:var(--surface2)}
  .row-click{cursor:pointer}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
    border:1px solid transparent}
  .b-ts{background:rgba(227,91,91,.13);color:var(--ts);border-color:rgba(227,91,91,.35)}
  .b-secret{background:rgba(224,146,54,.13);color:var(--secret);border-color:rgba(224,146,54,.35)}
  .b-restricted{background:rgba(205,164,52,.13);color:var(--restricted);border-color:rgba(205,164,52,.35)}
  .b-public{background:rgba(70,180,221,.13);color:var(--public);border-color:rgba(70,180,221,.35)}
  .b-green{background:rgba(52,201,138,.13);color:var(--green);border-color:rgba(52,201,138,.3)}
  .b-muted{background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}

  /* org tree */
  .tree{font-size:13px}
  .tree .node{padding:7px 0}
  .tree .unit{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);
    border-radius:9px;padding:7px 12px;font-weight:600}
  .tree .kids{margin-inline-start:22px;border-inline-start:1px dashed var(--border);padding-inline-start:16px;margin-top:6px}
  .tree .person{display:inline-flex;align-items:center;gap:8px;color:var(--muted);padding:5px 0;font-size:12.5px}

  /* documents */
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
  .doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:.18s;position:relative;overflow:hidden}
  .doc:hover{border-color:var(--cyan);transform:translateY(-2px)}
  .doc.locked{opacity:.85}
  .doc.locked::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(227,91,91,.04) 9px,rgba(227,91,91,.04) 18px)}
  .doc .d-ico{width:40px;height:40px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center;color:var(--cyan);margin-bottom:12px}
  .doc h4{margin:0 0 6px;font-size:14px}
  .doc .d-meta{color:var(--muted);font-size:11.5px;line-height:1.7}
  .doc .d-foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--border-soft)}
  .lock-msg{display:flex;align-items:center;gap:8px;color:var(--red);font-size:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft)}

  /* map */
  .map-wrap{position:relative;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:#0b1422}
  .map-svg{width:100%;display:block}
  .layers{position:absolute;inset-block-start:14px;inset-inline-end:14px;background:rgba(13,21,36,.9);
    border:1px solid var(--border);border-radius:10px;padding:12px 14px;backdrop-filter:blur(8px);min-width:160px}
  .layers .lt{font-size:11px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
  .layer-row{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:4px 0;cursor:pointer}
  .layer-row input{width:auto;margin:0}
  .marker{cursor:pointer;transition:.2s}
  .marker:hover{filter:brightness(1.3)}
  .map-pop{position:absolute;background:rgba(13,21,36,.96);border:1px solid var(--cyan);border-radius:10px;
    padding:11px 14px;font-size:12.5px;min-width:170px;box-shadow:var(--shadow);pointer-events:none;display:none;z-index:5}
  .map-pop b{display:block;margin-bottom:5px;font-size:13px}
  .map-pop .mp-row{color:var(--muted);line-height:1.7}

  /* audit */
  .audit-time{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .pulse{animation:flash 1.4s ease both}
  @keyframes flash{0%{background:var(--cyan-soft)}100%{background:transparent}}

  /* detail panel */
  .overlay{position:fixed;inset:0;background:rgba(4,8,15,.6);backdrop-filter:blur(3px);z-index:40;display:none;
    align-items:stretch;justify-content:flex-start}
  html[dir=rtl] .overlay{justify-content:flex-start}
  .panel{width:420px;max-width:92vw;height:100%;background:linear-gradient(180deg,var(--surface),var(--bg2));
    border-inline-end:1px solid var(--border);padding:26px;overflow-y:auto;animation:slidein .3s ease both;margin-inline-start:auto}
  html[dir=ltr] .panel{margin-inline-start:auto;margin-inline-end:0}
  .panel .pclose{float:inline-end;cursor:pointer;color:var(--muted)}
  .panel h3{margin:0 0 2px;font-size:19px}
  .kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
  .kv .kk{color:var(--muted)}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
  .stagger>*{animation:rise .5s both}
  .stagger>*:nth-child(1){animation-delay:.03s}
  .stagger>*:nth-child(2){animation-delay:.08s}
  .stagger>*:nth-child(3){animation-delay:.13s}
  .stagger>*:nth-child(4){animation-delay:.18s}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="atmos"></div>
<div id="app"></div>

<!-- detail overlay -->
<div class="overlay" id="overlay" onclick="if(event.target.id==='overlay')closePanel()">
  <div class="panel" id="panel"></div>
</div>

/* ---------- audit ---------- */
function logAudit(actionKey,target,result){
  _aid++;
  const now=new Date();
  S.audit.unshift({
    id:_aid,
    time:now.toLocaleTimeString(S.lang==="ar"?"ar-IQ":"en-GB",{hour12:false}),
    actor:ROLES[S.role].name[S.lang],
    action:t(actionKey),
    target:target||"—",
    result:result===false?"deny":"ok",
  });
  S.newAuditId=_aid;
  if(S.audit.length>60)S.audit.pop();
}

function render(){
  document.documentElement.lang=S.lang;
  document.documentElement.dir=S.lang==="ar"?"rtl":"ltr";
  $("#app").innerHTML = S.loggedIn ? shell() : loginView();
  if(S.loggedIn) startClock();
}

/* ---------- login ---------- */
function loginView(){
  const opts=Object.entries(ROLES).map(([k,r])=>`<option value="${k}" ${k===S.role?"selected":""}>${r.name[S.lang]} · ${clrName(r.clearance)}</option>`).join("");
  return `<div class="classbar">${t("classline")}</div>
  <div class="login-wrap"><div class="login-card">
    ${crest(74).replace('<svg','<svg class="crest"')}
    <h1>${t("sysName")}</h1>
    <div class="sub">SECURE INSTITUTIONAL MANAGEMENT SYSTEM</div>
    <div class="field"><label>${t("selectRole")}</label>
      <select id="roleSel">${opts}</select></div>
    <div class="field"><label>${t("username")}</label><input value="user.demo" /></div>
    <div class="field"><label>${t("password")}</label><input type="password" value="••••••••••" /></div>
    <button class="btn btn-primary" onclick="doLogin()">${t("signin")}</button>
    <div class="login-foot">🔒 ${t("mfaNote")}
      <br><span class="demo-pill">${t("demoMode")}</span></div>
  </div></div>`;
}
function doLogin(){
  const sel=$("#roleSel"); if(sel)S.role=sel.value;
  S.loggedIn=true; S.view="dashboard";
  logAudit("act_login","",true);
  render();
}

/* ---------- shell ---------- */
function shell(){
  return `<div class="classbar">${t("classline")}</div>
  <div class="topbar">
    <div class="brand">${crest(30)}<span>${t("sysShort")}</span></div>
    <div class="spacer"></div>
    <div class="clock" id="clock"></div>
    <div class="chip" onclick="toggleLang()">${I.globe}<span>${S.lang==="ar"?"EN":"عربي"}</span></div>
    <div class="chip role" onclick="cycleRole()" title="${t('switchRole')}">${ROLES[S.role].name[S.lang]}</div>
    <div class="avatar">${ROLES[S.role].name[S.lang].slice(0,1)}</div>
    <button class="icon-btn" onclick="doLogout()" title="${t('logout')}">⎋</button>
  </div>
  <div class="body">
    ${sidebar()}
    <div class="main" id="main">${page()}</div>
  </div>`;
}
function sidebar(){
  const item=(mod)=>{
    const allowed=can(mod);
    return `<div class="nav-item ${S.view===mod?"active":""}" onclick="go('${mod}')">
      ${I[mod]}<span>${t(mod)}</span>${allowed?"":'<span class="lock">'+I.lock+'</span>'}</div>`;
  };
  return `<div class="sidebar">
    <div class="nav-group">${t("nav_main")}</div>
    ${item("dashboard")}
    <div class="nav-group">${t("nav_admin")}</div>
    ${item("personnel")}${item("documents")}${item("finance")}
    <div class="nav-group">${t("nav_ops")}</div>
    ${item("operations")}${item("assets")}${item("gis")}${item("incidents")}
    <div class="nav-group">${t("nav_security")}</div>
    ${item("audit")}
  </div>`;
}

/* ---------- navigation ---------- */
function go(mod){
  if(!can(mod)){
    logAudit("act_block",t(mod),false);
    S.view=mod; // show no-access page
    $("#main").innerHTML=noAccess();
    refreshSidebar(); return;
  }
  S.view=mod;
  logAudit("act_nav",t(mod),true);
  $("#main").innerHTML=page();
  refreshSidebar();
}
function refreshSidebar(){const sb=document.querySelector(".sidebar");if(sb)sb.outerHTML=sidebar();}
function noAccess(){
  return `<div class="page-head"><div><h2>${t(S.view)}</h2></div></div>
  <div class="card" style="text-align:center;padding:60px 20px">
    <div style="color:var(--red);margin-bottom:14px">${I.lock.replace('width="18"','width="40"').replace('height="18"','height="40"')}</div>
    <h3 style="color:var(--red)">${t("noaccess")}</h3>
    <div class="csub" style="margin-top:6px">${ROLES[S.role].name[S.lang]} · ${clrName(myClear())}</div>
  </div>`;
}

/* ---------- pages ---------- */
function page(){
  switch(S.view){
    case"dashboard":return dashboard();
    case"personnel":return personnel();
    case"documents":return documents();
    case"finance":return finance();
    case"operations":return operations();
    case"assets":return assetsView();
    case"gis":return gisView();
    case"incidents":return incidents();
    case"audit":return auditView();
    default:return dashboard();
  }
}

function fmtB(v){return (S.lang==="ar"? v.toFixed(1)+" مليار" : v.toFixed(1)+"B");}

function dashboard(){
  const kpi=(label,val,ico,delta,up)=>`<div class="card kpi">
    <div class="k-top"><span class="k-label">${label}</span><span class="k-ico">${ico}</span></div>
    <div class="k-val">${val}</div>
    <div class="k-delta ${up?'up':'down'}">${up?'▲':'▼'} ${delta}</div></div>`;
  const bars=[58,72,49,83,67,91,76].map((h,i)=>`<rect x="${i*40+14}" y="${120-h}" width="22" height="${h}" rx="4" fill="url(#bg)" opacity="${.6+i*.05}"/>`).join("");
  const dist=[1,2,3,4].map(l=>PEOPLE.filter(p=>p.c===l).length);
  const tot=dist.reduce((a,b)=>a+b,0); let off=0;
  const colors=["#46b4dd","#cda434","#e09236","#e35b5b"];
  const segs=dist.map((v,i)=>{const frac=v/tot;const dash=frac*339.292;const s=`<circle r="54" cx="70" cy="70" fill="none" stroke="${colors[i]}" stroke-width="16" stroke-dasharray="${dash} 339.292" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;off+=dash;return s;}).join("");
  const recent=S.audit.slice(0,6).map(a=>`<tr><td class="audit-time">${a.time}</td><td>${esc(a.action)}</td><td style="color:var(--muted)">${esc(a.target)}</td><td><span class="badge ${a.result==='ok'?'b-green':'b-ts'}">${a.result==='ok'?t('res_ok'):t('res_deny')}</span></td></tr>`).join("");

  const remaining=FIN.budget-FIN.spent-FIN.committed;

  const finCard=(label,val,color)=>`<div class="card kpi"><div class="k-label">${label}</div>

  const maxDept=Math.max(...FIN.byDept.map(d=>d.v));
  const deptBars=FIN.byDept.map(d=>`<div style="margin-bottom:13px">
    <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span>${esc(d.d[S.lang])}</span><span style="color:var(--muted);font-family:var(--mono)">${fmtB(d.v)}</span></div>
    <div style="height:8px;background:var(--surface3);border-radius:6px;overflow:hidden"><div style="height:100%;width:${d.v/maxDept*100}%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:6px"></div></div></div>`).join("");
  return `<div class="page-head"><div><h2>${t("dashboard")}</h2><div class="desc">${t("d_desc")}</div></div></div>
  <div class="kpi-grid stagger">
    ${kpi(t("kpi_staff"),"1,240",I.personnel,"3.2% ",true)}
    ${kpi(t("kpi_tasks"),"127",I.operations,"8 ",true)}
    ${kpi(t("kpi_docs"),"1,812",I.documents,"1.1% ",true)}
    ${kpi(t("kpi_inc"),"4",I.incidents,"2 ",false)}
  </div>
  <div class="card" style="margin-bottom:22px">
    <h3>${t("finance")} — ${t("budget")}</h3><div class="csub">${t("utilization")}: ${util}%</div>
    <div class="kpi-grid" style="margin-bottom:14px">
      ${finCard(t("budget"),FIN.budget,"var(--text)")}
      ${finCard(t("spent"),FIN.spent,"var(--orange)")}
      ${finCard(t("committed"),FIN.committed,"var(--gold)")}
      ${finCard(t("remaining"),remaining,"var(--green)")}
    </div>
    <div style="height:12px;background:var(--surface3);border-radius:8px;overflow:hidden;display:flex">
      <div style="width:${FIN.spent/FIN.budget*100}%;background:var(--orange)"></div>
      <div style="width:${FIN.committed/FIN.budget*100}%;background:var(--gold)"></div>
    </div>
    <div style="display:flex;gap:18px;margin-top:9px;font-size:11.5px;color:var(--muted)">
      <span><span class="dot" style="background:var(--orange)"></span> ${t("spent")}</span>
      <span><span class="dot" style="background:var(--gold)"></span> ${t("committed")}</span>
      <span><span class="dot" style="background:var(--surface3)"></span> ${t("remaining")}</span>
    </div>
  </div>
  <div class="grid2">
    <div class="card"><h3>${t("activity")}</h3><div class="csub">—</div>
      <svg viewBox="0 0 300 130" style="width:100%"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46b4dd"/><stop offset="1" stop-color="#2b6f8c"/></linearGradient></defs>
      <line x1="10" y1="120" x2="290" y2="120" stroke="#243450"/>${bars}</svg></div>
    <div class="card"><h3>${t("clearDist")}</h3><div class="csub">—</div>
      <div style="display:flex;align-items:center;gap:20px">
      <svg viewBox="0 0 140 140" width="130" height="130">${segs}<text x="70" y="76" text-anchor="middle" fill="#e7edf7" font-size="22" font-family="monospace">${tot}</text></svg>
      <div style="font-size:12.5px;line-height:2.1">
        ${[4,3,2,1].map(l=>`<div><span class="dot" style="background:${colors[l-1]}"></span> ${clrName(l)} · ${PEOPLE.filter(p=>p.c===l).length}</div>`).join("")}
      </div></div></div>
  </div>
  <div class="grid2">
    <div class="card"><h3>${t("byDept")}</h3><div class="csub">${t("iqd")} — ${S.lang==="ar"?"مليار":"billions"}</div>${deptBars}</div>
    <div class="card"><h3>${t("recent")}</h3><div class="csub">—</div>
      <table><thead><tr><th>${t("th_time")}</th><th>${t("th_action")}</th><th>${t("th_target")}</th><th>${t("th_result")}</th></tr></thead>

}

function gisView(){
  const markerColor={facility:"#46b4dd",unit:"#cda434",asset:"#34c98a"};
  const markers=SITES.filter(s=>S.mapLayers[s.type]).map((s,i)=>`
    <g class="marker" onmousemove="mapPop(event,${SITES.indexOf(s)})" onmouseleave="hidePop()">
      <circle cx="${s.x}" cy="${s.y}" r="13" fill="${markerColor[s.type]}" opacity="0.18"/>
      <circle cx="${s.x}" cy="${s.y}" r="6" fill="${markerColor[s.type]}"/>
      <circle cx="${s.x}" cy="${s.y}" r="6" fill="none" stroke="${markerColor[s.type]}" opacity="0.5"><animate attributeName="r" from="6" to="15" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite"/></circle>
    </g>`).join("");
  const layerRow=(key,label,color)=>`<div class="layer-row" onclick="toggleLayer('${key}')">
    <input type="checkbox" ${S.mapLayers[key]?'checked':''} onclick="event.stopPropagation();toggleLayer('${key}')">

  <div class="map-wrap">

      <defs><linearGradient id="land" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15253b"/><stop offset="1" stop-color="#0f1a2c"/></linearGradient></defs>
      <rect width="700" height="500" fill="#0b1422"/>
      <!-- stylized Iraq silhouette -->
      <path d="M300 70 L470 60 L520 110 L505 180 L560 240 L530 330 L490 470 L420 460 L380 380 L330 360 L300 300 L250 270 L270 200 L300 150 Z"
        fill="url(#land)" stroke="#2e4b6e" stroke-width="2" stroke-opacity="0.7"/>
      <g stroke="#243450" stroke-width="0.5" opacity="0.5">
        ${Array.from({length:14}).map((_,i)=>`<line x1="${i*50}" y1="0" x2="${i*50}" y2="500"/>`).join("")}
        ${Array.from({length:10}).map((_,i)=>`<line x1="0" y1="${i*50}" x2="700" y2="${i*50}"/>`).join("")}
      </g>
      ${markers}

    </div>
    <div class="map-pop" id="mapPop"></div>

}
function toggleLayer(k){S.mapLayers[k]=!S.mapLayers[k];$("#main").innerHTML=gisView();}
function mapPop(e,i){const s=SITES[i];const pop=$("#mapPop");const wrap=e.currentTarget.closest(".map-wrap").getBoundingClientRect();

    <td><span class="badge ${CLR[x.c].cls}">${clrName(x.c)}</span></td></tr>`).join("");
  const kpi=(l,v,c)=>`<div class="card kpi"><div class="k-label">${l}</div><div class="k-val" style="font-size:26px;color:${c}">${v}</div></div>`;
  return `<div class="page-head"><div><h2>${t("incidents")}</h2><div class="desc">${t("inc_desc")}</div></div></div>
  <div class="kpi-grid stagger" style="margin-bottom:22px">
    ${kpi(t("sev_crit"),visible.filter(x=>x.sev==="sev_crit").length,"var(--red)")}
    ${kpi(t("sev_high"),visible.filter(x=>x.sev==="sev_high").length,"var(--orange)")}
    ${kpi(t("st_active"),visible.filter(x=>x.st==="st_active").length,"var(--green)")}
    ${kpi(t("st_closed"),visible.filter(x=>x.st==="st_closed").length,"var(--muted)")}
  </div>
  <div class="card"><h3>${t("incidents")}</h3><div class="csub">—</div>
    <table><thead><tr><th>${t("th_inc")}</th><th>${t("th_sev")}</th><th>${t("th_status")}</th><th>${t("th_reported")}</th><th>${t("th_clear")}</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

/* ---------- controls ---------- */
function toggleLang(){S.lang=S.lang==="ar"?"en":"ar";logAudit("act_lang",S.lang.toUpperCase(),true);render();}
function cycleRole(){
  const keys=Object.keys(ROLES);const idx=keys.indexOf(S.role);
  S.role=keys[(idx+1)%keys.length];
  logAudit("act_role",ROLES[S.role].name[S.lang],true);
  if(!can(S.view))S.view="dashboard";
  render();
}
function doLogout(){S.loggedIn=false;render();}
function closePanel(){$("#overlay").style.display="none";}

/* ---------- clock ---------- */
let clockTimer=null;
function startClock(){
  if(clockTimer)clearInterval(clockTimer);
  const tick=()=>{const c=$("#clock");if(c)c.textContent=new Date().toLocaleTimeString(S.lang==="ar"?"ar-IQ":"en-GB",{hour12:false})+"  ·  "+new Date().toLocaleDateString(S.lang==="ar"?"ar-IQ":"en-GB");};
  tick();clockTimer=setInterval(tick,1000);
}

/* ---------- boot ---------- */
render();
</script>
</body>
</html>
