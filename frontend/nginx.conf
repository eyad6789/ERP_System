# Preserve the ORIGINAL protocol when fronted by another reverse proxy (e.g. the
# host nginx terminating TLS for speedit-iq.com). Without this, this container's
# own $scheme (http) would clobber X-Forwarded-Proto and Django's SECURE_SSL_REDIRECT
# would 301-loop every /api call. Falls back to $scheme for direct (local) access.
map $http_x_forwarded_proto $erp_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health to the Django service.
    location /api/ {
        # File uploads (documents, spreadsheets, scanned invoices) flow through here.
        client_max_body_size 25m;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $erp_forwarded_proto;
    }
    location /health {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $erp_forwarded_proto;
    }
}
