# Production override for the shared Hostinger host.
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
# (the dev docker-compose.override.yml is NOT shipped to the server).
#
# Isolation rules on this shared box:
#  - Postgres/Redis/API have NO published host ports (internal docker network only).
#  - Only `web` is published, bound to 127.0.0.1:8090, fronted by the host nginx
#    vhost which terminates TLS for speedit-iq.com.
services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    # Internal only — reached by `web` as http://api:8000 over the compose network.
    ports: !override []

  web:
    restart: unless-stopped
    # Localhost only; the host nginx reverse-proxies https://speedit-iq.com here.
    ports: !override
      - "127.0.0.1:8090:80"
