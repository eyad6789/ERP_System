# Host nginx vhost for the ERP — reverse-proxies https://speedit-iq.com to the
# dockerized web container (127.0.0.1:8090). Lives at /etc/nginx/sites-available/erp
# on 187.124.183.65, symlinked into sites-enabled. Mirrors the existing qrmenu vhost.
upstream erp_web {
  server 127.0.0.1:8090;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name speedit-iq.com www.speedit-iq.com;

  ssl_certificate     /etc/letsencrypt/live/speedit-iq.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/speedit-iq.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # Match the app/web container limit so 25 MB uploads pass end to end.
  client_max_body_size 25m;

  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection        "";
  proxy_redirect off;

  location / {
    proxy_pass http://erp_web;
  }

  # Never serve dotfiles (except ACME).
  location ~ /\.(?!well-known) {
    deny all;
  }
}

server {
  listen 80;
  server_name speedit-iq.com www.speedit-iq.com;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}
